workflows:
  godot-ios:
    name: Godot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.randyland.trumpcardgame
      vars:
        GODOT_VERSION: "4.6.2"
        BUNDLE_ID: "com.randyland.trumpcardgame"
        APP_STORE_CONNECT_TEAM_ID: "LXHNJ6Y83Z"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    scripts:
      - name: Install Godot Engine
        script: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip" -O godot.zip
          unzip -q godot.zip
          sudo cp -R Godot.app /Applications/Godot.app
          sudo ln -sf /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

      - name: Install Godot Export Templates
        script: |
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          cp templates/* "$TEMPLATES_DIR/"

      - name: Import Godot project
        script: |
          cd $CM_BUILD_DIR
          godot --headless --import 2>&1 || true
          godot --headless --import 2>&1 || true

      - name: Export Xcode project from Godot
        script: |
          cd $CM_BUILD_DIR
          mkdir -p build/ios
          godot --headless --export-release "iOS" build/ios/Trump.xcodeproj

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_DEVELOPMENT --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build with xcodebuild
        script: |
          cd $CM_BUILD_DIR/build/ios
          # List available schemes
          xcodebuild -list -project Trump.xcodeproj
          # Archive
          xcodebuild -project Trump.xcodeproj \
            -scheme "Trump" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/ios/Trump.xcarchive \
            archive

      - name: Export .ipa
        script: |
          cat > $CM_BUILD_DIR/exportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>LXHNJ6Y83Z</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/ios/Trump.xcarchive \
            -exportOptionsPlist $CM_BUILD_DIR/exportOptions.plist \
            -exportPath $CM_BUILD_DIR/build/ios/output

    artifacts:
      - build/ios/output/*.ipa
      - build/ios/Trump.xcarchive
